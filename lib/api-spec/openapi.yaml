openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Sayq POS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: categories
    description: Product categories
  - name: products
    description: Product management
  - name: orders
    description: Order/transaction management
  - name: dashboard
    description: Dashboard and reporting
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/sync:
    post:
      operationId: syncUser
      tags: [users]
      summary: JIT provision or update current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncUserInput"
      responses:
        "200":
          description: Existing user updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"
        "201":
          description: New user created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (owner/manager only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppUser"

  /users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update user role (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order with items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get today's sales summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      summary: Get top selling products
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /dashboard/sales-chart:
    get:
      operationId: getSalesChart
      tags: [dashboard]
      summary: Get sales data for chart (last 7 days)
      responses:
        "200":
          description: Sales chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesChartPoint"

  /dashboard/cashier-performance:
    get:
      operationId: getCashierPerformance
      tags: [dashboard]
      summary: Get cashier performance stats
      responses:
        "200":
          description: Cashier performance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CashierPerformance"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AppUser:
      type: object
      required: [id, clerkId, email, name, role, createdAt]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [owner, manager, cashier]
        createdAt:
          type: string
          format: date-time

    SyncUserInput:
      type: object
      required: [email, name]
      properties:
        email:
          type: string
        name:
          type: string

    UpdateRoleInput:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [owner, manager, cashier]

    Category:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        productCount:
          type: integer

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1

    Product:
      type: object
      required: [id, name, price, stock, isActive]
      properties:
        id:
          type: integer
        name:
          type: string
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        price:
          type: number
        stock:
          type: integer
        imageUrl:
          type: ["string", "null"]
        isActive:
          type: boolean

    ProductInput:
      type: object
      required: [name, price, stock]
      properties:
        name:
          type: string
          minLength: 1
        categoryId:
          type: ["integer", "null"]
        price:
          type: number
          minimum: 0
        stock:
          type: integer
          minimum: 0
        imageUrl:
          type: ["string", "null"]
        isActive:
          type: boolean

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        categoryId:
          type: ["integer", "null"]
        price:
          type: number
          minimum: 0
        stock:
          type: integer
          minimum: 0
        imageUrl:
          type: ["string", "null"]
        isActive:
          type: boolean

    OrderItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          minimum: 1

    OrderInput:
      type: object
      required: [items, paymentMethod, amountPaid]
      properties:
        cashierName:
          type: string
        cashierId:
          type: ["integer", "null"]
        paymentMethod:
          type: string
          enum: [cash, card, qris]
        amountPaid:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"

    OrderItem:
      type: object
      required: [id, productId, productName, quantity, priceAtSale, subtotal]
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        priceAtSale:
          type: number
        subtotal:
          type: number

    Order:
      type: object
      required: [id, total, paymentMethod, status, createdAt]
      properties:
        id:
          type: integer
        cashierName:
          type: ["string", "null"]
        cashierId:
          type: ["integer", "null"]
        total:
          type: number
        amountPaid:
          type: number
        change:
          type: number
        paymentMethod:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        itemCount:
          type: integer

    OrderDetail:
      type: object
      required: [id, total, paymentMethod, status, createdAt, items]
      properties:
        id:
          type: integer
        cashierName:
          type: ["string", "null"]
        cashierId:
          type: ["integer", "null"]
        total:
          type: number
        amountPaid:
          type: number
        change:
          type: number
        paymentMethod:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    DashboardSummary:
      type: object
      required: [todayRevenue, todayOrders, totalProducts, lowStockCount, todayRevenueDiff, todayOrdersDiff]
      properties:
        todayRevenue:
          type: number
        todayOrders:
          type: integer
        totalProducts:
          type: integer
        lowStockCount:
          type: integer
        todayRevenueDiff:
          type: number
        todayOrdersDiff:
          type: number

    TopProduct:
      type: object
      required: [productId, productName, totalSold, totalRevenue]
      properties:
        productId:
          type: integer
        productName:
          type: string
        totalSold:
          type: integer
        totalRevenue:
          type: number

    SalesChartPoint:
      type: object
      required: [date, revenue, orders]
      properties:
        date:
          type: string
        revenue:
          type: number
        orders:
          type: integer

    CashierPerformance:
      type: object
      required: [cashierId, cashierName, totalOrders, totalRevenue]
      properties:
        cashierId:
          type: integer
        cashierName:
          type: string
        totalOrders:
          type: integer
        totalRevenue:
          type: number
