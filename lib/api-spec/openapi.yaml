openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Sayq POS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: categories
    description: Product categories
  - name: products
    description: Product management
  - name: orders
    description: Order/transaction management
  - name: dashboard
    description: Dashboard and reporting
  - name: branches
    description: Branch management
  - name: ingredients
    description: Raw material management
  - name: semiFinished
    description: Semi-finished goods management
  - name: recipes
    description: Bill of materials
  - name: inventory
    description: Live inventory and stock adjustments
  - name: shiftAudits
    description: Shift audit and reconciliation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/sync:
    post:
      operationId: syncUser
      tags: [users]
      summary: JIT provision or update current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncUserInput"
      responses:
        "200":
          description: Existing user updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"
        "201":
          description: New user created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (owner/manager only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppUser"

  /users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update user role (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppUser"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/{id}/variants:
    get:
      operationId: listProductVariants
      tags: [products]
      summary: List variants of a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of variants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductVariant"
    post:
      operationId: createProductVariant
      tags: [products]
      summary: Add a variant to a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductVariantInput"
      responses:
        "201":
          description: Created variant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductVariant"

  /variants/{id}:
    patch:
      operationId: updateProductVariant
      tags: [products]
      summary: Update a variant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductVariantUpdate"
      responses:
        "200":
          description: Updated variant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductVariant"
    delete:
      operationId: deleteProductVariant
      tags: [products]
      summary: Delete a variant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order with items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get today's sales summary
      parameters:
        - name: branchId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      summary: Get top selling products
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
        - name: branchId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /dashboard/sales-chart:
    get:
      operationId: getSalesChart
      tags: [dashboard]
      summary: Get sales data for chart (last 7 days)
      parameters:
        - name: branchId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Sales chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesChartPoint"

  /dashboard/cashier-performance:
    get:
      operationId: getCashierPerformance
      tags: [dashboard]
      summary: Get cashier performance stats
      parameters:
        - name: branchId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Cashier performance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CashierPerformance"

  /branches:
    get:
      operationId: listBranches
      tags: [branches]
      summary: List all branches
      responses:
        "200":
          description: List of branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Branch"
    post:
      operationId: createBranch
      tags: [branches]
      summary: Create a branch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BranchInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"

  /ingredients:
    get:
      operationId: listIngredients
      tags: [ingredients]
      summary: List ingredients (raw materials) with live stock
      parameters:
        - name: branchId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ingredient"
    post:
      operationId: createIngredient
      tags: [ingredients]
      summary: Create an ingredient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngredientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"

  /ingredients/{id}:
    patch:
      operationId: updateIngredient
      tags: [ingredients]
      summary: Update an ingredient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngredientUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"
    delete:
      operationId: deleteIngredient
      tags: [ingredients]
      summary: Delete an ingredient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /semi-finished:
    get:
      operationId: listSemiFinished
      tags: [semiFinished]
      summary: List semi-finished goods with live stock
      parameters:
        - name: branchId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of semi-finished goods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SemiFinished"
    post:
      operationId: createSemiFinished
      tags: [semiFinished]
      summary: Create a semi-finished good
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SemiFinishedInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SemiFinished"

  /semi-finished/{id}:
    patch:
      operationId: updateSemiFinished
      tags: [semiFinished]
      summary: Update a semi-finished good
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SemiFinishedUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SemiFinished"
    delete:
      operationId: deleteSemiFinished
      tags: [semiFinished]
      summary: Delete a semi-finished good
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /semi-finished/{id}/produce:
    post:
      operationId: produceSemiFinished
      tags: [semiFinished]
      summary: Record production of a semi-finished good (deducts ingredients, computes COGS)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProduceInput"
      responses:
        "200":
          description: Produced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SemiFinished"

  /recipes:
    get:
      operationId: getRecipe
      tags: [recipes]
      summary: Get the BOM components for a parent
      parameters:
        - name: parentType
          in: query
          required: true
          schema:
            type: string
            enum: [product, semi_finished]
        - name: parentId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recipe components
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeComponent"
    put:
      operationId: setRecipe
      tags: [recipes]
      summary: Replace the BOM for a parent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetRecipeInput"
      responses:
        "200":
          description: Updated recipe
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeComponent"

  /inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      summary: Get live inventory for a branch
      parameters:
        - name: branchId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /inventory/low-stock:
    get:
      operationId: getLowStock
      tags: [inventory]
      summary: Get inventory items below the low-stock threshold
      parameters:
        - name: branchId
          in: query
          schema:
            type: integer
        - name: threshold
          in: query
          schema:
            type: number
            default: 200
      responses:
        "200":
          description: Low stock items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /stock-adjustments:
    get:
      operationId: listStockAdjustments
      tags: [inventory]
      summary: List stock adjustment history
      parameters:
        - name: branchId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Adjustment history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockAdjustment"
    post:
      operationId: createStockAdjustment
      tags: [inventory]
      summary: Record a stock adjustment (in/out/loss); 'in' triggers moving-average COGS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockAdjustmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockAdjustment"

  /shift-audits:
    get:
      operationId: listShiftAudits
      tags: [shiftAudits]
      summary: List shift audits
      parameters:
        - name: branchId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Shift audits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShiftAudit"
    post:
      operationId: createShiftAudit
      tags: [shiftAudits]
      summary: Close a shift and submit physical counts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShiftAuditInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftAudit"

  /shift-audits/expected:
    get:
      operationId: getExpectedStock
      tags: [shiftAudits]
      summary: Get current expected stock snapshot for closing a shift
      parameters:
        - name: branchId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Expected stock snapshot
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /shift-audits/{id}:
    get:
      operationId: getShiftAudit
      tags: [shiftAudits]
      summary: Get a shift audit with reconciliation detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Shift audit detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftAuditDetail"

  /shift-audits/{id}/verify:
    patch:
      operationId: verifyShiftAudit
      tags: [shiftAudits]
      summary: Validate audit and sync physical stock to inventory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftAudit"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /dashboard/financial:
    get:
      operationId: getFinancialReport
      tags: [dashboard]
      summary: Get gross revenue, COGS and gross profit
      parameters:
        - name: branchId
          in: query
          schema:
            type: integer
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Financial report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialReport"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AppUser:
      type: object
      required: [id, clerkId, email, name, role, createdAt]
      properties:
        id:
          type: integer
        clerkId:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [owner, manager, cashier]
        createdAt:
          type: string
          format: date-time

    SyncUserInput:
      type: object
      required: [email, name]
      properties:
        email:
          type: string
        name:
          type: string

    UpdateRoleInput:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [owner, manager, cashier]

    Category:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        productCount:
          type: integer

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1

    Product:
      type: object
      required: [id, name, price, costPrice, stock, isActive]
      properties:
        id:
          type: integer
        name:
          type: string
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        price:
          type: number
        costPrice:
          type: number
        stock:
          type: integer
        imageUrl:
          type: ["string", "null"]
        isActive:
          type: boolean

    ProductInput:
      type: object
      required: [name, price, stock]
      properties:
        name:
          type: string
          minLength: 1
        categoryId:
          type: ["integer", "null"]
        price:
          type: number
          minimum: 0
        costPrice:
          type: number
          minimum: 0
          default: 0
        stock:
          type: integer
          minimum: 0
        imageUrl:
          type: ["string", "null"]
        isActive:
          type: boolean

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        categoryId:
          type: ["integer", "null"]
        price:
          type: number
          minimum: 0
        costPrice:
          type: number
          minimum: 0
        stock:
          type: integer
          minimum: 0
        imageUrl:
          type: ["string", "null"]
        isActive:
          type: boolean

    ProductVariant:
      type: object
      required: [id, productId, name, price, sortOrder]
      properties:
        id:
          type: integer
        productId:
